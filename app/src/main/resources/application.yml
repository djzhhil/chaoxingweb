spring:
  application:
    name: chaoxingweb

  # 数据源配置
  datasource:
    url: jdbc:mysql://localhost:3306/chaoxing?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

# JWT 配置
jwt:
  secret: chaoxingweb-secret-key-2024-secure-jwt-token
  expiration: 86400000 # 24小时

# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /

# 日志配置
logging:
  level:
    com.chaoxing.auth: DEBUG
    org.springframework.security: DEBUG
